services:
  postgres-airflow:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data

  airflow-webserver:
    image: apache/airflow:2.10.4
    depends_on:
      - postgres-airflow
    env_file:
      - .env
    environment:
      PYTHONPATH: /opt/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    ports:
      - "8080:8080"
    volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.10.4
    depends_on:
      - postgres-airflow
    env_file:
      - .env
    environment:
      PYTHONPATH: /opt/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    command: scheduler

volumes:
  postgres-airflow-data: